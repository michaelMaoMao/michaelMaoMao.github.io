*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--sans);background:var(--ivory);color:var(--slate);line-height:1.6}
a{color:var(--clay);text-decoration:none}a:hover{text-decoration:underline}

main{max-width:1200px;margin:0 auto;padding:2rem}
.controls{display:flex;gap:1rem;margin-bottom:1.5rem;flex-wrap:wrap}
.controls button{padding:.5rem 1rem;border:1px solid var(--g300);border-radius:6px;background:var(--paper);cursor:pointer;font-size:.85rem}
.controls button.active{background:var(--clay);color:white;border-color:var(--clay)}
table{width:100%;border-collapse:collapse;background:var(--paper);border:1px solid var(--g300);border-radius:8px;overflow:hidden}
th{text-align:left;padding:.75rem 1rem;background:var(--g100);font-size:.8rem;text-transform:uppercase;letter-spacing:.05em;color:var(--g500);border-bottom:1px solid var(--g300);cursor:pointer}
th:hover{color:var(--clay)}
td{padding:.6rem 1rem;border-bottom:1px solid var(--g100);font-size:.9rem}
tr:hover{background:var(--g100)}
.rank-num{font-family:var(--serif);font-weight:700;color:var(--clay);text-align:center;width:40px}
.score-cell{font-weight:700;font-family:var(--mono)}
.bar{height:6px;border-radius:3px;background:var(--clay);display:inline-block;vertical-align:middle;margin-right:.5rem}
.grade{font-size:.75rem;padding:2px 8px;border-radius:4px;font-weight:600;display:inline-block}

.g-C{background:var(--g100);color:var(--g700)}.g-D{background:var(--g300);color:var(--g500)}
footer{text-align:center;padding:2rem;color:var(--g500);font-size:.85rem;border-top:1px solid var(--g300);margin-top:2rem}
</style>

const dims=["","title","section","category","ov","td","ac","nv","im","ev","tm","rp"];
let filter="all",sCol=4,sAsc=false;
function g(v){return v>=9?"S":v>=8?"A":v>=7?"B":v>=6?"C":"D"}
function gc(v){return"g-"+g(v)}
function render(){
  let d=filter==="all"?[...A]:A.filter(a=>a.s===filter);
  d.sort((a,b)=>{
    let va,vb;
    if(sCol===1){va=a.t;vb=b.t}else if(sCol===2){va=a.s;vb=b.s}else if(sCol===3){va=a.c;vb=b.c}else if(sCol===4){va=a.ov;vb=b.ov}else{va=a.scores[sCol-5];vb=b.scores[sCol-5]}
    return sAsc?(va>vb?1:-1):(va<vb?1:-1)
  });
  const tb=document.getElementById("tb");
  while(tb.firstChild)tb.removeChild(tb.firstChild);
  d.forEach((a,i)=>{
    const tr=document.createElement("tr");
    const rank=document.createElement("td");rank.className="rank-num";rank.textContent=i+1;tr.appendChild(rank);
    const title=document.createElement("td");const strong=document.createElement("strong");const a2=document.createElement("a");a2.href="articles/"+a.slug+".html";a2.textContent=a.t;a2.style.color="var(--clay)";a2.style.textDecoration="none";strong.appendChild(a2);title.appendChild(strong);tr.appendChild(title);
    const sec=document.createElement("td");sec.textContent=a.s;tr.appendChild(sec);
    const cat=document.createElement("td");cat.textContent=a.c;tr.appendChild(cat);
    const sc=document.createElement("td");sc.className="score-cell";sc.textContent=a.ov.toFixed(1);tr.appendChild(sc);
    a.scores.forEach(v=>{const td=document.createElement("td");td.textContent=v;tr.appendChild(td)});
    const gr=document.createElement("td");const span=document.createElement("span");span.className="grade "+gc(a.ov);span.textContent=g(a.ov);gr.appendChild(span);tr.appendChild(gr);
    tb.appendChild(tr)
  })
}
// Build filter buttons
const fc=document.getElementById("fc");
["all","engineering","research"].forEach(f=>{
  const btn=document.createElement("button");
  btn.textContent=f==="all"?"全部":f==="engineering"?"Engineering":"Research";
  if(f==="all")btn.className="active";
  btn.addEventListener("click",()=>{filter=f;fc.querySelectorAll("button").forEach(b=>b.classList.remove("active"));btn.classList.add("active");render()});
  fc.appendChild(btn)
});
// Sort headers

    document.querySelectorAll("th").forEach(h=>h.classList.remove("sorted"));

  })
});
